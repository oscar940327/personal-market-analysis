name: Daily report

on:
  schedule:
    - cron: "0 12 * * 1-5"  # UTC 12:00 週一到週五（台灣 20:00）
  workflow_dispatch: {}

permissions:
  contents: write  # 允許 push 回 repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write config/.env from secrets
        run: |
          mkdir -p config
          cat > config/.env << EOF
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL=openrouter/deepseek/deepseek-chat-v3-0324
          EOF

      - name: Run daily report
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: openrouter/deepseek/deepseek-chat-v3-0324
        run: |
          python pipeline/daily_report.py --preview --no-email

      - name: Track signals
        run: |
          python track_signals.py

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signal_log.csv data/db/market.db report/ || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: daily signal tracking $(date +%Y-%m-%d)" && \
            git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: report/
          if-no-files-found: warn