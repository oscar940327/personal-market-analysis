name: Daily report

on:
  schedule:
    # cron 是 UTC；台灣 08:10 = UTC 00:10
    - cron: "10 0 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          iconv -f UTF-16 -t UTF-8 requirements.txt > requirements.utf8.txt || cp requirements.txt requirements.utf8.txt
          pip install -r requirements.utf8.txt

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/db
          key: marketdb-${{ github.run_id }}
          restore-keys: |
            marketdb-

      - name: Write config/.env from secrets
        run: |
          mkdir -p config
          cat > config/.env << 'EOF'
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL=openrouter/deepseek/deepseek-chat-v3-0324
          EOF

      - name: Run daily report
        run: |
          python pipeline/daily_report.py --preview --no-email

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report/report_*.html
          if-no-files-found: error